<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dyno Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 350px;
            min-height: 400px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            color: #334155;
        }
        
        .header {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            padding: 16px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .header .subtitle {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .content {
            padding: 16px;
        }
        
        .section {
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .chat-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .chat-input:focus {
            border-color: #3b82f6;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2563eb;
        }
        
        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        
        .quick-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        .quick-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            text-decoration: none;
            color: #475569;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .quick-link:hover {
            border-color: #3b82f6;
            background: #f0f9ff;
            color: #1d4ed8;
        }
        
        .bookmark-search {
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        
        .search-input:focus {
            border-color: #3b82f6;
        }
        
        .bookmark-results {
            max-height: 120px;
            overflow-y: auto;
            margin-top: 8px;
        }
        
        .bookmark-item {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            margin-bottom: 4px;
            background: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .bookmark-item:hover {
            background: #f8fafc;
        }
        
        .bookmark-title {
            font-size: 13px;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 2px;
        }
        
        .bookmark-url {
            font-size: 11px;
            color: #64748b;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .emoji {
            font-size: 16px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🦕 Dyno Dashboard</h1>
        <div class="subtitle">Your AI life assistant</div>
    </div>
    
    <div class="content">
        <!-- Chat Section -->
        <div class="section">
            <div class="section-title">
                <span class="emoji">💬</span>
                Chat with Dyno
            </div>
            <textarea 
                class="chat-input" 
                id="chatInput" 
                placeholder="Ask Dyno anything about your life data..."
                rows="3"></textarea>
            <button class="btn btn-primary" id="sendMessage" style="width: 100%; margin-top: 8px;">
                Send Message
            </button>
        </div>
        
        <!-- Quick Links -->
        <div class="section">
            <div class="section-title">
                <span class="emoji">🚀</span>
                Quick Access
            </div>
            <div class="quick-links">
                <a href="#" class="quick-link" data-page="dashboard">
                    <span class="emoji">📊</span>
                    Dashboard
                </a>
                <a href="#" class="quick-link" data-page="nutrition">
                    <span class="emoji">🍎</span>
                    Nutrition
                </a>
                <a href="#" class="quick-link" data-page="fitness">
                    <span class="emoji">💪</span>
                    Fitness
                </a>
                <a href="#" class="quick-link" data-page="journal">
                    <span class="emoji">📝</span>
                    Journal
                </a>
            </div>
        </div>
        
        <!-- Bookmark Search -->
        <div class="section">
            <div class="section-title">
                <span class="emoji">🔍</span>
                Find Bookmarks
            </div>
            <div class="bookmark-search">
                <input 
                    type="text" 
                    class="search-input" 
                    id="bookmarkSearch" 
                    placeholder="Search your bookmarks...">
                <div class="bookmark-results" id="bookmarkResults"></div>
            </div>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
